version: '3.8'

services:
  # Relational Database Cache
  db:
    image: postgres:15-alpine
    container_name: trace-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trace_password}
      POSTGRES_DB: ${POSTGRES_DB:-trace_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - trace-network
    restart: always

  # Persistence and Event Broker layer
  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trace-network
    restart: always

  # Application Server Node 1
  app-node-1:
    build: ./server
    container_name: trace-app-1
    environment:
      - PORT=${PORT:-3000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - CORS_ORIGIN=*
      - RATE_LIMIT_WINDOW_MS=900000 # 15 mins
      - RATE_LIMIT_MAX=100
      - DATABASE_URL=postgresql://${POSTGRES_USER:-trace_user}:${POSTGRES_PASSWORD:-trace_password}@db:5432/${POSTGRES_DB:-trace_db}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-https://your-supabase-project.supabase.co/auth/v1/.well-known/jwks.json}
      - SUPABASE_JWT_ISSUER=${SUPABASE_JWT_ISSUER:-https://your-supabase-project.supabase.co/auth/v1}
      - SUPABASE_JWT_AUDIENCE=${SUPABASE_JWT_AUDIENCE:-authenticated}
    depends_on:
      - redis
      - db
    networks:
      - trace-network
    restart: always

  # Application Server Node 2
  app-node-2:
    build: ./server
    container_name: trace-app-2
    environment:
      - PORT=${PORT:-3000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - CORS_ORIGIN=*
      - RATE_LIMIT_WINDOW_MS=900000 # 15 mins
      - RATE_LIMIT_MAX=100
      - DATABASE_URL=postgresql://${POSTGRES_USER:-trace_user}:${POSTGRES_PASSWORD:-trace_password}@db:5432/${POSTGRES_DB:-trace_db}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-https://your-supabase-project.supabase.co/auth/v1/.well-known/jwks.json}
      - SUPABASE_JWT_ISSUER=${SUPABASE_JWT_ISSUER:-https://your-supabase-project.supabase.co/auth/v1}
      - SUPABASE_JWT_AUDIENCE=${SUPABASE_JWT_AUDIENCE:-authenticated}
    depends_on:
      - redis
      - db
    networks:
      - trace-network
    restart: always

  # Nginx Load Balancer acting as Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: trace-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-node-1
      - app-node-2
    networks:
      - trace-network
    restart: always

volumes:
  redis_data:
  pg_data:

networks:
  trace-network:
    driver: bridge
